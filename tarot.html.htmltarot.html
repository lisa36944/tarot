<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小熊軟糖塔羅牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            text-align: center;
        }

        h1 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stage {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .stage.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Stage 0: Think of Question */
        .think-section {
            padding: 30px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .think-section h2 {
            color: #d4693d;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .thought-bubble {
            font-size: 3em;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .instruction {
            font-size: 1.1em;
            color: #555;
            line-height: 1.8;
            margin: 20px 0;
        }

        /* Stage 1: Shuffling */
        .shuffle-section {
            padding: 40px;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6cc 100%);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .gummy-bear-container {
            position: relative;
            height: 200px;
            margin: 30px 0;
        }

        .gummy-bear-left,
        .gummy-bear-right {
            position: absolute;
            font-size: 4em;
            top: 50%;
            transform: translateY(-50%);
        }

        .gummy-bear-left {
            left: 20px;
            animation: shuffleLeft 1s ease-in-out infinite;
        }

        .gummy-bear-right {
            right: 20px;
            animation: shuffleRight 1s ease-in-out infinite;
        }

        @keyframes shuffleLeft {
            0%, 100% { transform: translateY(-50%) rotateZ(-10deg); }
            50% { transform: translateY(-50%) rotateZ(10deg); }
        }

        @keyframes shuffleRight {
            0%, 100% { transform: translateY(-50%) scaleX(-1) rotateZ(10deg); }
            50% { transform: translateY(-50%) scaleX(-1) rotateZ(-10deg); }
        }

        .card-pile {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 120px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 80px;
            height: 120px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: white;
        }

        .card:nth-child(1) {
            transform: rotateZ(0deg) translateX(0);
            animation: shuffle 0.8s ease-in-out infinite;
        }

        .card:nth-child(2) {
            transform: rotateZ(-5deg) translateX(-5px);
            animation: shuffle 0.8s ease-in-out infinite 0.1s;
        }

        .card:nth-child(3) {
            transform: rotateZ(5deg) translateX(5px);
            animation: shuffle 0.8s ease-in-out infinite 0.2s;
        }

        @keyframes shuffle {
            0%, 100% { transform: rotateY(0) rotateZ(var(--rotate)); }
            50% { transform: rotateY(20deg) rotateZ(var(--rotate)); }
        }

        /* Stage 2: Draw Card */
        .draw-section {
            padding: 40px;
        }

        .cards-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .tarot-card {
            width: 120px;
            height: 180px;
            background: white;
            border: 3px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            position: relative;
            overflow: hidden;
        }

        .tarot-card:hover {
            transform: scale(1.05) rotateY(5deg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .tarot-card::before {
            content: '🌟';
            position: absolute;
            font-size: 3em;
            opacity: 0.1;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }

        .card-back {
            font-size: 2.5em;
            text-align: center;
        }

        .card-front {
            display: none;
            text-align: center;
            z-index: 10;
        }

        .card-front.flipped {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card-emoji {
            font-size: 2em;
        }

        .card-name {
            font-weight: bold;
            color: #764ba2;
            font-size: 0.75em;
            line-height: 1.1;
        }

        /* Buttons */
        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        .result-message {
            margin-top: 20px;
            padding: 20px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            color: #333;
            display: none;
            line-height: 1.6;
        }

        .result-message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

            { name: '木棍十', emoji: '🌿😫', meaning: '負擔、壓力、責任。負擔會被解除。' },
            { name: '木棍侍者', emoji: '👦🌿', meaning: '熱情、冒險、年輕。充滿熱情和冒險精神。' },
            { name: '木棍騎士', emoji: '🏇🌿', meaning: '熱情、衝動、冒險。跟隨你的熱情行動。' },
            { name: '木棍皇后', emoji: '👑🌿', meaning: '溫暖、親切、豐富。你擁有無限的能量和魅力。' },
            { name: '木棍國王', emoji: '👑🌿💪', meaning: '領導、創業、遠見。領導者的風範和遠見。' }
        ];

        let currentStage = 0;
        let drawnCards = [];

        function nextStage() {
            document.getElementById(`stage${currentStage}`).classList.remove('active');
            currentStage++;
            document.getElementById(`stage${currentStage}`).classList.add('active');

            if (currentStage === 2) {
                initializeCards();
            }
        }

        function initializeCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            drawnCards = [];

            // Shuffle and select cards
            const shuffled = [...tarotCards].sort(() => Math.random() - 0.5);
            const selectedCards = shuffled.slice(0, 12);

            selectedCards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'tarot-card';
                cardEl.innerHTML = `
                    <div class="card-back">🧸</div>
                    <div class="card-front">
                        <div class="card-emoji">${card.emoji}</div>
                        <div class="card-name">${card.name}</div>
                    </div>
                `;
                cardEl.addEventListener('click', () => drawCard(card, cardEl));
                container.appendChild(cardEl);
            });
        }

        function drawCard(card, element) {
            element.querySelector('.card-front').classList.add('flipped');
            element.style.pointerEvents = 'none';

            const resultMsg = document.getElementById('resultMessage');
            resultMsg.innerHTML = `
                <strong>🎴 ${card.name}</strong><br>
                <span style="font-size: 1.5em; margin: 10px 0; display: block;">${card.emoji}</span>
                <p style="margin-top: 10px;">${card.meaning}</p>
            `;
            resultMsg.classList.add('show');
        }

        function resetReading() {
            currentStage = 0;
            document.querySelectorAll('.stage').forEach(stage => stage.classList.remove('active'));
            document.getElementById('stage0').classList.add('active');
            document.getElementById('resultMessage').classList.remove('show');
        }

        // Initialize
        initializeCards();
    </script>
</body>
</html>
